<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적 비교 리스트 — 렌트리</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#f2f3f5; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif; display:flex; justify-content:center; padding:0 0 40px; color:#1a1a1a; }
  .frame { width:390px; background:#f2f3f5; min-height:100vh; }

  /* 상단 상품 헤더 */
  .prodrow { display:flex; gap:10px; padding:14px 16px; background:#fff; border-bottom:1px solid #eee; }
  .prodrow .thumb { width:44px; height:44px; border-radius:10px; background:#e8f0fe; flex:none; }
  .prodrow .info b { font-size:13px; }
  .prodrow .info div { font-size:12px; color:#888; margin-top:2px; line-height:1.35; }

  /* 옵션 토글 */
  .optrow { display:flex; gap:22px; padding:12px 16px; background:#fff; border-bottom:8px solid #f2f3f5; }
  .opt { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:#333; }
  .switch { position:relative; width:38px; height:22px; border-radius:12px; background:#d8dbe0; cursor:pointer; transition:.2s; flex:none; }
  .switch.on { background:#2050b5; }
  .switch .knob { position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition:.2s; box-shadow:0 1px 2px rgba(0,0,0,.3); }
  .switch.on .knob { left:18px; }

  /* 견적 카드 */
  #list { padding:12px 12px 0; }
  .ocard { background:#fff; border:1px solid #eaecef; border-radius:14px; padding:13px 14px; margin-bottom:12px; }
  .ocard.sel { border:2px solid #2050b5; box-shadow:0 4px 14px rgba(32,80,181,.12); }

  .ohead { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .lefthead { display:flex; align-items:center; gap:6px; }
  .toptag { font-size:10.5px; font-weight:800; color:#fff; background:linear-gradient(135deg,#fb9836,#f2730f); padding:3px 8px; border-radius:6px; }
  .brandtag { font-size:11.5px; font-weight:800; color:#2050b5; background:#eaf0fd; padding:3px 8px; border-radius:6px; }
  .brandtag.ubus { color:#334155; background:#e7ebf1; }
  .brandcert { font-size:10.5px; color:#9aa0a8; font-weight:600; }

  /* 월요금 · 현금지원 반반 색상 박스 */
  .obody { display:flex; gap:9px; }
  .ocol { flex:1 1 0; min-width:0; border-radius:10px; padding:11px 12px; }
  .ocol.left { background:#eef2fd; cursor:pointer; position:relative; }
  .graphico { position:absolute; right:8px; top:8px; width:26px; height:26px; border-radius:8px; background:#fff; border:1px solid #d3ddf0; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 2px rgba(20,40,90,.06); }
  .ocol.left:active .graphico { background:#eef2fd; }
  .ocol.right { background:#fff6ec; }
  .collabel { font-size:11.5px; font-weight:700; }
  .ocol.left .collabel { color:#3a5bd0; }
  .ocol.right .collabel { color:#c2600a; }
  .colnum { font-size:22px; font-weight:800; margin-top:3px; }
  .ocol.left .colnum { color:#1a2b4a; }
  .ocol.right .colnum { color:#ec6a0c; }
  .colnum span { font-size:14px; font-weight:700; margin-left:1px; }

  /* 프로모션 배너 */
  .obanner { position:relative; margin-top:11px; background:linear-gradient(135deg,#1f2d4d,#16233f); border-radius:10px; padding:11px 12px; color:#fff; overflow:hidden; }
  .obanner .bt1 { font-size:11px; color:#aab6d6; font-weight:600; }
  .obanner .bt2 { font-size:13px; font-weight:800; margin-top:2px; }
  .obanner .free { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:#f2730f; color:#fff; font-size:11px; font-weight:800; padding:6px 9px; border-radius:8px; }

  /* 판매자 */
  .oseller { display:flex; align-items:center; gap:7px; margin-top:12px; }
  .oseller .av { width:26px; height:26px; border-radius:50%; background:#d9dde3; flex:none; overflow:hidden; }
  .oseller .nm { font-size:12.5px; font-weight:700; }
  .oseller .star { font-size:11.5px; color:#f5a623; font-weight:700; }
  .oseller .cnt { font-size:11px; color:#9aa0a8; }
  .oseller .grade { margin-left:auto; font-size:10.5px; font-weight:800; padding:3px 8px; border-radius:6px; }
  .grade.blue { color:#2050b5; background:#eaf0fd; }
  .grade.green { color:#0f8a4d; background:#e4f5ec; }

  /* 버튼 (견적서 · 채팅상담 반반) */
  .obtnrow { display:flex; gap:8px; margin-top:13px; }
  .obtn { padding:12px 6px; text-align:center; border-radius:10px; font-size:12.5px; font-weight:800; cursor:pointer; white-space:nowrap; display:flex; align-items:center; justify-content:center; gap:4px; }
  .obtn.quote { flex:3 1 0; border:1px solid #cdd5e2; color:#42506a; background:#fff; }
  .obtn.chat { flex:7 1 0; background:#2050b5; color:#fff; box-shadow:0 2px 6px rgba(32,80,181,.28); }

  /* 월요금 상세 모달 (선형 그래프) */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:flex-end; justify-content:center; z-index:50; }
  .modal-overlay.show { display:flex; }
  .sheet { width:390px; max-height:88vh; background:#fff; border-radius:18px 18px 0 0; overflow-y:auto; padding-bottom:20px; }
  .shead { display:flex; justify-content:space-between; align-items:center; padding:16px 16px 10px; }
  .shead b { font-size:15px; }
  .shead .x { font-size:20px; color:#999; cursor:pointer; }
  .graphbox { border:1px solid #eee; border-radius:12px; padding:14px 10px 10px; margin:0 16px; }
  .graphbox .gtitle { font-size:12px; font-weight:700; color:#333; margin-bottom:8px; display:flex; justify-content:space-between; }
  .graphbox .gtitle span { font-size:10.5px; color:#aaa; font-weight:400; }
  .mcase { display:flex; flex-wrap:wrap; gap:6px; margin:0 16px 12px; }
  .mtag { font-size:11.5px; font-weight:800; color:#2050b5; background:#eaf0fd; padding:5px 11px; border-radius:20px; }
  .breaktitle { font-size:12.5px; font-weight:800; color:#333; margin:18px 16px 8px; }
  .trow .body .sub { font-size:11px; color:#9aa0a8; margin-top:2px; }
  .trow { display:flex; align-items:center; gap:10px; margin:0 16px 10px; padding:12px; border-radius:10px; background:#fafbfc; }
  .trow .num { width:22px; height:22px; border-radius:50%; background:#2050b5; color:#fff; font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; flex:none; }
  .trow .body b { font-size:12.5px; }
  .trow .amt { margin-left:auto; text-align:right; font-size:13px; font-weight:800; }
</style>
</head>
<body>
<div class="frame">
  <div class="prodrow">
    <div class="thumb"></div>
    <div class="info">
      <b>쿠쿠 · CP-AHS100HEW(S)</b>
      <div>인앤아웃 안심직수 냉정 정수기 (조리수밸브 살균 포함) 1대</div>
      <div>방문관리 · 36개월</div>
    </div>
  </div>

  <div class="optrow">
    <div class="opt"><span>제휴카드</span><div class="switch on" data-opt="card"><div class="knob"></div></div></div>
    <div class="opt"><span>휴대폰 결합</span><div class="switch" data-opt="phone"><div class="knob"></div></div></div>
  </div>

  <div id="list"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="sheet">
    <div class="shead"><b id="mTitle">월 요금 상세</b><span class="x" id="mClose">✕</span></div>
    <div class="mcase" id="mCase"></div>
    <div id="mGraph"></div>
    <div class="breaktitle">구간별 상세</div>
    <div id="mBreak"></div>
  </div>
</div>

<script>
const offers = [
  {
    sel:true, brand:'KG하나렌탈', cert:true,
    fee:'19,000', total:'총 326,850원', cash:'27+13',
    seller:'렌트리 안심구독', rating:'5.0', contracts:'계약 4,346건',
    grade:{ text:'안심구독', color:'blue' },
    topTag:'최대혜택가',
    tags:['신규 프로모션 할인'],
    segs:[{m:12,f:19000,t:'promo'},{m:24,f:28400,t:'normal'}],
    chatText:'렌트리와 채팅상담'
  },
  {
    brand:'KG하나렌탈', cert:true,
    fee:'24,000', total:'총 246,850원', cash:'25',
    seller:'김상식 팀장', rating:'5.0', contracts:'계약 4,346건',
    grade:{ text:'공식', color:'blue' },
    tags:['정액할인','1년 12만원'],
    segs:[{m:12,f:24000,t:'fixed'},{m:24,f:34000,t:'normal'}],
    chatText:'채팅상담하기'
  },
  {
    brand:'KG하나렌탈', cert:true,
    fee:'24,000', total:'총 246,850원', cash:'24',
    seller:'한은global 매니저', rating:'5.0', contracts:'계약 4,346건',
    grade:{ text:'우수', color:'green' },
    tags:['반값할인'],
    segs:[{m:12,f:24000,t:'half'},{m:24,f:48000,t:'normal'}],
    chatText:'채팅상담하기'
  },
  {
    brand:'UBUS', brandClass:'ubus', cert:true,
    fee:'24,000', total:'총 246,850원', cash:'21',
    seller:'박유신 프로', rating:'5.0', contracts:'계약 4,346건',
    grade:null,
    tags:['반값할인','단계 인상'],
    segs:[{m:12,f:24000,t:'half'},{m:12,f:36000,t:'step'},{m:12,f:48000,t:'normal'}],
    chatText:'채팅상담하기'
  }
];

function cardHtml(o,i){
  const grade = o.grade ? '<span class="grade '+o.grade.color+'">'+o.grade.text+'</span>' : '';
  return ''
    + '<div class="ocard'+(o.sel?' sel':'')+'">'
    +   '<div class="ohead">'
    +     '<span class="lefthead">'
    +       (o.topTag?'<span class="toptag">'+o.topTag+'</span>':'')
    +       '<span class="brandtag'+(o.brandClass?' '+o.brandClass:'')+'">'+o.brand+'</span>'
    +     '</span>'
    +     (o.cert?'<span class="brandcert">● 브랜드인증</span>':'')
    +   '</div>'
    +   '<div class="obody">'
    +     '<div class="ocol left" data-idx="'+i+'">'
    +       '<span class="graphico"><svg width="15" height="15" viewBox="0 0 18 18"><polyline points="2,12 6,8 10,10 16,4" fill="none" stroke="#2050b5" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg></span>'
    +       '<div class="collabel">첫달 요금</div>'
    +       '<div class="colnum">'+o.fee+'<span>원</span></div>'
    +     '</div>'
    +     '<div class="ocol right">'
    +       '<div class="collabel">현금지원</div>'
    +       '<div class="colnum orange">'+o.cash+'<span>만원</span></div>'
    +     '</div>'
    +   '</div>'
    +   '<div class="oseller">'
    +     '<div class="av"></div>'
    +     '<span class="nm">'+o.seller+'</span>'
    +     '<span class="star">★ '+o.rating+'</span>'
    +     '<span class="cnt">'+o.contracts+'</span>'
    +     grade
    +   '</div>'
    +   '<div class="obtnrow">'
    +     '<div class="obtn quote">📄 견적</div>'
    +     '<div class="obtn chat">'+o.chatText+'</div>'
    +   '</div>'
    + '</div>';
}

document.getElementById('list').innerHTML = offers.map(cardHtml).join('');

document.querySelectorAll('.switch').forEach(sw=>{
  sw.addEventListener('click', ()=> sw.classList.toggle('on'));
});

/* ===== 월요금 상세: 선형 그래프 모달 ===== */
const TOTAL_MONTHS = 36;
function fmt(n){ return n.toLocaleString('ko-KR'); }

// 세그먼트 타입별 적용 내용/색상
const SEG = {
  promo:  { desc:'신규 프로모션 적용', color:'#2050b5' },
  fixed:  { desc:'정액할인 적용',     color:'#2050b5' },
  half:   { desc:'반값할인 적용',     color:'#2050b5' },
  step:   { desc:'요금 인상',         color:'#9aa0a8' },
  normal: { desc:'정상가',            color:'#9aa0a8' }
};
function segColor(t){ return (SEG[t]||SEG.normal).color; }
function segDesc(t){ return (SEG[t]||SEG.normal).desc; }

function renderGraph(segs){
  const w=340,h=170,pad=28;
  const maxFee = Math.max(...segs.map(s=>s.f));
  const scaleX = (w-pad*2)/TOTAL_MONTHS;
  const scaleY = (h-pad*1.4)/maxFee;
  let x=0, path='', points=[];
  segs.forEach(s=>{
    const x1=x, x2=x+s.m;
    const y = h-pad*0.6 - s.f*scaleY;
    path += (path===''?'M':'L')+(pad+x1*scaleX)+' '+y+' L '+(pad+x2*scaleX)+' '+y+' ';
    points.push({x:pad+x1*scaleX, y, label:fmt(s.f)+'원', color:segColor(s.t)});
    x=x2;
  });
  let svg='<svg width="100%" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="overflow:visible;">';
  svg+='<path d="'+path+'" fill="none" stroke="#2050b5" stroke-width="2.5"/>';
  points.forEach(p=>{
    svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+p.color+'"/>';
    svg+='<text x="'+p.x+'" y="'+(p.y-8)+'" font-size="9.5" fill="'+p.color+'" font-weight="700">'+p.label+'</text>';
  });
  svg+='<text x="'+pad+'" y="'+(h-6)+'" font-size="9" fill="#aaa">1개월</text>';
  svg+='<text x="'+(w-pad-30)+'" y="'+(h-6)+'" font-size="9" fill="#aaa">'+TOTAL_MONTHS+'개월</text>';
  svg+='</svg>';
  return '<div class="graphbox"><div class="gtitle">월 렌탈료 변동 그래프 <span>'+TOTAL_MONTHS+'개월 계약</span></div>'+svg+'</div>';
}

function renderBreakList(segs){
  let html='', start=1;
  segs.forEach((s,i)=>{
    const end=start+s.m-1;
    html+='<div class="trow"><div class="num" style="background:'+segColor(s.t)+';">'+(i+1)+'</div>'
       + '<div class="body"><b>'+start+(s.m>1?'~'+end:'')+'회차 ('+s.m+'개월)</b><div class="sub">'+segDesc(s.t)+'</div></div>'
       + '<div class="amt">'+fmt(s.f)+'원/월</div></div>';
    start=end+1;
  });
  return html;
}

function openModal(i){
  const o = offers[i];
  document.getElementById('mTitle').textContent = o.seller+' · 요금 상세';
  document.getElementById('mCase').innerHTML = (o.tags||[]).map(t=>'<span class="mtag">'+t+'</span>').join('');
  document.getElementById('mGraph').innerHTML = renderGraph(o.segs);
  document.getElementById('mBreak').innerHTML = renderBreakList(o.segs);
  document.getElementById('modal').classList.add('show');
}

document.getElementById('list').addEventListener('click', e=>{
  const col = e.target.closest('.ocol.left');
  if(col) openModal(parseInt(col.dataset.idx));
});
document.getElementById('mClose').addEventListener('click', ()=>document.getElementById('modal').classList.remove('show'));
document.getElementById('modal').addEventListener('click', e=>{ if(e.target.id==='modal') e.currentTarget.classList.remove('show'); });
</script>
</body>
</html>
