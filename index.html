<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적서 카드 — 할인/할증 케이스별 표기</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body { background:#f2f3f5; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif; display:flex; justify-content:center; padding:24px 0 60px; }
  .frame { width:390px; background:#fff; min-height:100vh; position:relative; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid #eee; }
  .topbar h1 { font-size:15px; font-weight:700; }
  .topbar .sub { font-size:11px; color:#999; margin-top:2px; }
  .noticebar { background:#eef2ff; color:#3b4ed6; font-size:12px; padding:10px 16px; }
  .prodrow { display:flex; gap:10px; padding:14px 16px; border-bottom:8px solid #f2f3f5; }
  .prodrow .thumb { width:44px; height:44px; border-radius:10px; background:#e8f0fe; flex:none; }
  .prodrow .info b { font-size:13px; }
  .prodrow .info div { font-size:12px; color:#888; margin-top:2px; }
  .cardtoggle { display:flex; align-items:center; gap:8px; padding:12px 16px; font-size:13px; color:#333; font-weight:600; }
  .switch { position:relative; width:40px; height:22px; border-radius:12px; background:#d8dbe0; cursor:pointer; transition:.2s; flex:none; }
  .switch.on { background:#c0266f; }
  .switch .knob { position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition:.2s; box-shadow:0 1px 2px rgba(0,0,0,.3); }
  .switch.on .knob { left:20px; }
  .caseRow { display:flex; gap:6px; padding:0 16px 14px; overflow-x:auto; }
  .caseBtn { flex:none; font-size:11.5px; font-weight:700; padding:7px 10px; border-radius:8px; border:1px solid #dfe2e7; background:#fff; color:#666; cursor:pointer; white-space:nowrap; }
  .caseBtn.active { background:#1f2937; color:#fff; border-color:#1f2937; }
  .qcard { margin:0 16px 20px; border:1.5px solid #2050b5; border-radius:16px; overflow:hidden; }
  .qcard .brand { display:flex; justify-content:space-between; align-items:center; padding:10px 14px 0; }
  .qcard .brand b { font-size:13px; }
  .qcard .brand span { font-size:10.5px; color:#2050b5; font-weight:700; background:#eaf0fd; padding:3px 6px; border-radius:5px; }
  .feewrap { margin:10px 14px; padding:12px; border-radius:12px; background:#f7f8fa; cursor:pointer; position:relative; }
  .feewrap:active { background:#eef0f3; }
  .feewrap { border:1px solid #e5e7eb; }
  .feewrap .lbl { font-size:12px; color:#555; font-weight:600; display:flex; align-items:center; gap:4px; }
  .feewrap .lbl .detailbtn { margin-left:auto; display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; color:#2050b5; background:#fff; border:1px solid #dbe2f0; padding:4px 6px 4px 11px; border-radius:20px; box-shadow:0 1px 2px rgba(20,40,90,.06); letter-spacing:-.2px; }
  .feewrap .lbl .detailbtn .chev { display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px; border-radius:50%; background:#eef2fb; font-size:10px; line-height:1; }
  .pillrow { display:flex; gap:5px; margin:6px 0 4px; flex-wrap:wrap; }
  .pill { font-size:10.5px; font-weight:700; padding:3px 7px; border-radius:6px; }
  .pill.discount { background:#e7edfb; color:#2050b5; }
  .pill.waiver { background:#fef3e2; color:#b45309; }
  .pill.sur { background:#eceef1; color:#4b5563; }
  .pill.card { background:#fce8f1; color:#c0266f; }

  /* 할인 종류별 혜택 칩 슬라이더 */
  .benefitwrap { position:relative; margin:8px 0 6px; }
  .benefitrow { display:flex; gap:7px; overflow-x:auto; scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch; padding:1px 0 3px; }
  .benefitrow::-webkit-scrollbar { display:none; }
  .benefitrow { scrollbar-width:none; }
  .bchip { flex:none; scroll-snap-align:start; font-size:11.5px; font-weight:700; padding:5px 10px; border-radius:7px; white-space:nowrap; }
  .bchip.waiver { background:#fef3e2; color:#b45309; }
  .bchip.half   { background:#e7edfb; color:#2050b5; }
  .bchip.fixed  { background:#e5f5f1; color:#0f766e; }
  .bchip.sur    { background:#eceef1; color:#4b5563; }
  .bchip.card   { background:#fce8f1; color:#c0266f; }
  .benefithint { display:none; font-size:10.5px; color:#aaa; margin-top:2px; text-align:right; }
  .benefithint.show { display:block; }
  .benefitfade { display:none; position:absolute; top:0; right:0; width:28px; height:100%; pointer-events:none; background:linear-gradient(90deg,rgba(255,255,255,0),#fff); }
  .benefitfade.show { display:block; }
  .feenum { display:flex; align-items:baseline; gap:6px; }
  .feenum .now { font-size:23px; font-weight:800; color:#1a1a1a; }
  .feenum .strike { font-size:13px; color:#b6bac1; text-decoration:line-through; }
  .feecapt { font-size:11px; color:#999; margin-top:3px; }
  .feenet { display:none; font-size:11px; color:#4b5563; margin-top:6px; padding:5px 8px; border-radius:6px; background:#eef0f3; font-weight:600; }
  .cashrow { margin:0 14px 14px; padding:12px; border-radius:12px; background:#fff7ec; display:flex; flex-direction:column; align-items:flex-start; }
  .cashrow .l { font-size:11.5px; color:#c2760a; font-weight:600; }
  .cashrow .r { font-size:23px; font-weight:800; color:#e2660c; margin-top:5px; }
  .agentrow { display:flex; align-items:center; gap:8px; margin:0 14px 12px; }
  .agentrow .av { width:26px; height:26px; border-radius:50%; background:#ddd; flex:none; }
  .agentrow b { font-size:12.5px; }
  .agentrow .verified { font-size:10px; font-weight:700; color:#2050b5; background:#eaf0fd; padding:2px 6px; border-radius:5px; margin-left:6px; }
  .agentrow .star { font-size:11px; color:#f5a623; margin-left:6px; }
  .chatbtn { margin:0 14px 14px; padding:13px; text-align:center; background:#2050b5; border:1px solid #2050b5; color:#fff; border-radius:10px; font-size:14px; font-weight:800; cursor:pointer; box-shadow:0 2px 6px rgba(32,80,181,.28); }
  .chatbtn:active { background:#1a44a0; }
  .caseSection { padding:0 16px 30px; }
  .caseSection h2 { font-size:14px; font-weight:800; margin-bottom:10px; }
  .caseSection .hint { font-size:11.5px; color:#999; margin-bottom:12px; }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:flex-end; justify-content:center; z-index:50; }
  .modal-overlay.show { display:flex; }
  .sheet { width:390px; max-height:88vh; background:#fff; border-radius:18px 18px 0 0; overflow-y:auto; padding-bottom:20px; }
  .sheet .shead { display:flex; justify-content:space-between; align-items:center; padding:14px 16px 6px; }
  .sheet .shead .x { font-size:20px; color:#999; cursor:pointer; }
  .summary-card { margin:6px 16px 14px; padding:16px; border-radius:14px; background:linear-gradient(135deg,#3654d6,#2b46c4); color:#fff; }
  .summary-card .tag { font-size:11.5px; opacity:.85; margin-bottom:4px; }
  .summary-card .big { font-size:26px; font-weight:800; }
  .summary-card .stats { display:flex; gap:8px; margin-top:12px; }
  .summary-card .stat { flex:1; background:rgba(255,255,255,.14); border-radius:10px; padding:8px; text-align:center; }
  .summary-card .stat .k { font-size:10px; opacity:.8; }
  .summary-card .stat .v { font-size:13.5px; font-weight:800; margin-top:2px; }
  .tabs { display:flex; gap:6px; margin:0 16px 12px; }
  .tabbtn { flex:1; padding:9px 0; text-align:center; font-size:12px; font-weight:700; border:1px solid #e2e5ea; border-radius:9px; color:#777; cursor:pointer; }
  .tabbtn.active { border-color:#2050b5; color:#2050b5; background:#eef2fd; }
  .prod-mini { display:flex; gap:8px; align-items:center; margin:0 16px 10px; padding:10px; border-radius:10px; background:#f7f8fa; }
  .prod-mini .ic { width:30px; height:30px; border-radius:8px; background:#e3ecff; flex:none; }
  .prod-mini b { font-size:12.5px; }
  .prod-mini div.sub { font-size:10.5px; color:#999; margin-top:1px; }
  .chiprow { display:flex; gap:5px; margin:0 16px 14px; flex-wrap:wrap; }
  #tabContent { min-height:180px; margin:0 16px; }
  .graphbox { border:1px solid #eee; border-radius:12px; padding:14px 10px 10px; }
  .graphbox .gtitle { font-size:12px; font-weight:700; color:#333; margin-bottom:8px; display:flex; justify-content:space-between; }
  .graphbox .gtitle span { font-size:10.5px; color:#aaa; font-weight:400; }
  .brow { display:flex; justify-content:space-between; align-items:center; padding:10px 16px; border-bottom:1px solid #f2f3f5; font-size:12.5px; }
  .brow .k { color:#666; display:flex; align-items:center; gap:5px; }
  .brow .v { font-weight:800; color:#222; }
  .brow .v.strike { text-decoration:line-through; color:#bbb; font-weight:600; }
  .trow { display:flex; align-items:flex-start; gap:10px; margin:0 16px 10px; padding:12px; border-radius:10px; background:#fafbfc; }
  .trow.waiver { background:#fff8ec; }
  .trow .num { width:22px; height:22px; border-radius:50%; background:#2050b5; color:#fff; font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; flex:none; }
  .trow.waiver .num { background:#e2660c; }
  .trow .body b { font-size:12.5px; }
  .trow .body div.sub { font-size:11px; color:#999; margin-top:2px; }
  .trow .amt { margin-left:auto; text-align:right; font-size:13px; font-weight:800; }
  .trow .amt .sc { display:block; font-size:10.5px; color:#999; font-weight:500; margin-top:2px; }
  #breakList { margin-top:8px; }
  .breaktitle { font-size:12.5px; font-weight:800; color:#333; margin:18px 16px 8px; }
  .timeline-track { margin:0 16px 16px; }
  .tl-seg { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .tl-bar { height:26px; border-radius:6px; display:flex; align-items:center; padding:0 8px; font-size:11px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; }
</style>
</head>
<body>
<div class="frame">
  <div class="topbar">
    <div><h1>견적서 목록</h1><div class="sub">요일찾기 2024.01.22</div></div>
    <div style="font-size:16px;">⌂</div>
  </div>
  <div class="noticebar">견적서를 선택하고 주문확정을 해주세요.</div>

  <div class="prodrow">
    <div class="thumb"></div>
    <div class="info">
      <b>쿠쿠 · CP-AHS100HEW(S)</b>
      <div>인앤아웃 안심직수 냉정 정수기 (조리수밸브 살균 포함) 1대</div>
      <div>방문관리 · 36개월</div>
    </div>
  </div>

  <div class="cardtoggle">
    <span>제휴카드 결제 할인</span>
    <div class="switch" id="cardSwitch"><div class="knob"></div></div>
  </div>

  <div class="caseRow" id="caseRow"></div>

  <div class="qcard">
    <div class="brand"><b>코웨이 아이콘2 냉온정</b></div>
    <div class="feewrap" id="feeTrigger">
      <div class="lbl"><span>첫달 월요금</span><span class="detailbtn">자세히 보기<span class="chev">›</span></span></div>
      <div class="benefitwrap" id="benefitWrap">
        <div class="benefitrow" id="benefitRow"></div>
        <div class="benefitfade" id="benefitFade"></div>
      </div>
      <div class="benefithint" id="benefitHint">← 밀어서 전체 혜택 보기</div>
      <div class="feenum"><span class="now" id="feeNow">28,400원</span><span class="strike" id="feeStrike"></span></div>
    </div>
    <div class="cashrow">
      <div class="l">현금지원금 · 지급보장</div>
      <div class="r">25만원</div>
    </div>
    <div class="agentrow">
      <div class="av"></div>
      <b>김상식 팀장</b><span class="verified">✓ 판매자 인증</span><span class="star">★ 5.0</span>
    </div>
    <div class="chatbtn">채팅상담하기</div>
  </div>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="sheet">
    <div class="shead"><b style="font-size:15px;">월 요금 상세</b><span class="x" id="modalClose">✕</span></div>
    <div id="tabContent"></div>
    <div class="breaktitle">구간별 상세</div>
    <div id="breakList"></div>
  </div>
</div>

<script>
const BASE = 28400;
const TOTAL_MONTHS = 84;

// 규칙: 같은 종류 중복 불가(면제+면제, 반값+반값 ✕). 서로 다른 종류는 기간을 나눠 자유 조합.
//       상쇄(±)는 정액끼리만(정액할인 − vs 추가요금 +). 정률(면제/반값)과 정액은 상쇄가 아니라 공존(정률→정액 순).
// 혜택 종류(kind): waiver 월요금면제 / half 반값 / fixed 정액할인 / sur 추가요금
// 예시값: BASE 28,400 / 면제 3개월 / 반값 12개월(14,200) / 정액할인 −1,500원 12개월 / 추가요금 조리수기 +1,000원
const casesData = [
  { id:0, name:'기본', badges:[], segs:[{months:84,fee:28400,type:'normal',label:'전체 기간'}], capt:'정상가', strike:null },
  { id:1, name:'면제', badges:[{kind:'waiver',text:'3개월'}], segs:[{months:3,fee:0,type:'waiver',label:'1~3개월'},{months:81,fee:28400,type:'normal',label:'4~84개월'}], capt:'4개월부터 28,400원', strike:null },
  { id:2, name:'반값', badges:[{kind:'half',text:'12개월'}], segs:[{months:12,fee:14200,type:'half',label:'1~12개월'},{months:72,fee:28400,type:'normal',label:'13~84개월'}], capt:'13개월부터 28,400원', strike:28400 },
  { id:3, name:'정액할인', badges:[{kind:'fixed',text:'−1,500원'}], segs:[{months:12,fee:26900,type:'fixed',label:'1~12개월'},{months:72,fee:28400,type:'normal',label:'13~84개월'}], capt:'13개월부터 28,400원', strike:28400 },
  { id:4, name:'추가요금', badges:[{kind:'sur',text:'+1,000원'}], segs:[{months:84,fee:29400,type:'sur',label:'전체 기간'}], capt:'조리수기 포함가', strike:null },
  { id:5, name:'면제+반값', badges:[{kind:'waiver',text:'3개월'},{kind:'half',text:'12개월'}], segs:[{months:3,fee:0,type:'waiver',label:'1~3개월'},{months:12,fee:14200,type:'half',label:'4~15개월'},{months:69,fee:28400,type:'normal',label:'16~84개월'}], capt:'16개월부터 28,400원', strike:28400 },
  { id:6, name:'정액할인+추가요금', badges:[{kind:'fixed',text:'−1,500원'},{kind:'sur',text:'+1,000원'}], segs:[{months:12,fee:27900,type:'fixed',label:'1~12개월'},{months:72,fee:29400,type:'sur',label:'13~84개월'}], capt:'13개월부터 29,400원', strike:28400, netNote:'조리수기 +1,000 − 정액할인 1,500 = 순 −500원/월 (1~12개월)' },
  { id:7, name:'면제+반값+정액할인', badges:[{kind:'waiver',text:'3개월'},{kind:'half',text:'12개월'},{kind:'fixed',text:'−1,500원'}], segs:[{months:3,fee:0,type:'waiver',label:'1~3개월'},{months:12,fee:14200,type:'half',label:'4~15개월'},{months:12,fee:26900,type:'fixed',label:'16~27개월'},{months:57,fee:28400,type:'normal',label:'28~84개월'}], capt:'28개월부터 28,400원', strike:28400 },
  { id:8, name:'면제+반값+추가요금', badges:[{kind:'waiver',text:'3개월'},{kind:'half',text:'12개월'},{kind:'sur',text:'+1,000원'}], segs:[{months:3,fee:0,type:'waiver',label:'1~3개월'},{months:12,fee:15200,type:'half',label:'4~15개월'},{months:69,fee:29400,type:'sur',label:'16~84개월'}], capt:'16개월부터 29,400원', strike:28400 },
  { id:9, name:'면제+반값+정액할인+추가요금', badges:[{kind:'waiver',text:'3개월'},{kind:'half',text:'12개월'},{kind:'fixed',text:'−1,500원'},{kind:'sur',text:'+1,000원'}], segs:[{months:3,fee:0,type:'waiver',label:'1~3개월'},{months:12,fee:15200,type:'half',label:'4~15개월'},{months:12,fee:27900,type:'fixed',label:'16~27개월'},{months:57,fee:29400,type:'sur',label:'28~84개월'}], capt:'28개월부터 29,400원', strike:28400, netNote:'16~27개월: 조리수기 +1,000 − 정액할인 1,500 = 순 −500원/월' }
];

// 혜택 종류별 표시(아이콘·이름) — 각 할인별로 색은 CSS .bchip.<kind> 로 구분
const KIND = {
  waiver: { icon:'🎁', label:'월요금 면제' },
  half:   { icon:'🏷️', label:'반값할인' },
  fixed:  { icon:'🔻', label:'정액할인' },
  sur:    { icon:'➕', label:'추가요금' },
  card:   { icon:'💳', label:'카드할인' }
};
const TYPE_COLOR = { normal:'#94a3b8', half:'#2050b5', fixed:'#0f766e', waiver:'#e2660c', sur:'#4b5563' };

let currentCase = 0;
let cardOn = false;
let currentTab = 'graph';

function fmt(n){ return n.toLocaleString('ko-KR'); }

function activeSegs(c){
  return c.segs.map(s=>{
    let fee = s.fee;
    if(cardOn && fee>0) fee = Math.max(0, fee-2000);
    return Object.assign({}, s, {fee});
  });
}

function computeStats(segs){
  let totalPaid=0; let minFee=Infinity;
  segs.forEach(s=>{ totalPaid += s.fee*s.months; if(s.fee<minFee) minFee=s.fee; });
  const normalTotal = BASE*TOTAL_MONTHS;
  const diff = normalTotal-totalPaid;
  const pct = Math.round(diff/normalTotal*1000)/10;
  const avg = Math.round(totalPaid/TOTAL_MONTHS);
  return { totalPaid, diff, pct, avg, minFee };
}

function chipHtml(b){
  const label = (KIND[b.kind] && KIND[b.kind].label) || b.kind;
  return '<span class="bchip '+b.kind+'">'+label+' '+b.text+'</span>';
}

function renderBenefits(c){
  const row = document.getElementById('benefitRow');
  let chips = c.badges.map(chipHtml).join('');
  if(cardOn) chips += chipHtml({kind:'card', text:'−2,000원'});
  row.innerHTML = chips;
  document.getElementById('benefitWrap').style.display = chips ? 'block' : 'none';
  // 칩이 넘치면(할인이 많으면) 슬라이드 안내·페이드 표시
  const overflow = row.scrollWidth > row.clientWidth + 2;
  document.getElementById('benefitHint').classList.toggle('show', !!chips && overflow);
  document.getElementById('benefitFade').classList.toggle('show', !!chips && overflow);
  row.scrollLeft = 0;
}

function renderCaseButtons(){
  const row = document.getElementById('caseRow');
  row.innerHTML = casesData.map(c=>'<div class="caseBtn'+(c.id===currentCase?' active':'')+'" data-case="'+c.id+'">'+c.name+'</div>').join('');
  row.querySelectorAll('.caseBtn').forEach(btn=>{
    btn.addEventListener('click', ()=>{ applyCase(parseInt(btn.dataset.case)); });
  });
}

function applyCase(id){
  currentCase = id;
  const c = casesData[id];
  const segs = activeSegs(c);
  document.querySelectorAll('.caseBtn').forEach(b=>b.classList.toggle('active', parseInt(b.dataset.case)===id));

  renderBenefits(c);
  document.getElementById('feeNow').textContent = fmt(segs[0].fee)+'원';
  document.getElementById('feeStrike').textContent = (c.strike && segs[0].fee!==c.strike) ? fmt(c.strike)+'원' : '';

  if(document.getElementById('modalOverlay').classList.contains('show')){
    openModalForCase(id);
  }
}

function renderTimeline(segs){
  let html = '<div class="timeline-track">';
  segs.forEach(s=>{
    const w = Math.max(8, Math.round(s.months/TOTAL_MONTHS*100));
    html += '<div class="tl-seg"><div class="tl-bar" style="width:'+w+'%;background:'+(TYPE_COLOR[s.type]||'#94a3b8')+';">'+s.label+' · '+fmt(s.fee)+'원</div></div>';
  });
  html += '</div>';
  return html;
}

function renderTable(segs){
  let html = '<div style="margin:0 16px;">';
  segs.forEach(s=>{
    html += '<div class="brow"><span class="k">'+s.label+' ('+s.months+'개월)</span><span class="v">'+fmt(s.fee)+'원/월</span></div>';
  });
  html += '</div>';
  return html;
}

function renderGraph(segs){
  const w=340,h=170,pad=28;
  const maxFee = Math.max(BASE, ...segs.map(s=>s.fee));
  const scaleX = (w-pad*2)/TOTAL_MONTHS;
  const scaleY = (h-pad*1.4)/maxFee;
  let x=0; let path=''; let points=[];
  segs.forEach(s=>{
    const x1=x, x2=x+s.months;
    const y = h-pad*0.6 - s.fee*scaleY;
    path += (path===''?'M':'L')+(pad+x1*scaleX)+' '+y+' L '+(pad+x2*scaleX)+' '+y+' ';
    points.push({x:pad+x1*scaleX,y,label:fmt(s.fee)+'원',type:s.type});
    x=x2;
  });
  const baseY = h-pad*0.6-BASE*scaleY;
  let svg = '<svg width="100%" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="overflow:visible;">';
  svg += '<line x1="'+pad+'" y1="'+baseY+'" x2="'+(w-pad)+'" y2="'+baseY+'" stroke="#f3b6c9" stroke-dasharray="4,3" stroke-width="1"/>';
  svg += '<path d="'+path+'" fill="none" stroke="#2050b5" stroke-width="2.5"/>';
  points.forEach(p=>{
    const col = TYPE_COLOR[p.type] || '#2050b5';
    svg += '<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+col+'"/>';
    svg += '<text x="'+p.x+'" y="'+(p.y-8)+'" font-size="9.5" fill="'+col+'" font-weight="700">'+p.label+'</text>';
  });
  svg += '<text x="'+pad+'" y="'+(h-6)+'" font-size="9" fill="#aaa">1개월</text>';
  svg += '<text x="'+(w-pad-30)+'" y="'+(h-6)+'" font-size="9" fill="#aaa">'+TOTAL_MONTHS+'개월</text>';
  svg += '</svg>';
  return '<div class="graphbox"><div class="gtitle">월 렌탈료 변동 그래프 <span>'+TOTAL_MONTHS+'개월 계약</span></div>'+svg+'</div>';
}

const tabRenderers = { timeline: renderTimeline, table: renderTable, graph: renderGraph };

function setTab(tab){
  currentTab = tab;
  const c = casesData[currentCase];
  const segs = activeSegs(c);
  document.getElementById('tabContent').innerHTML = tabRenderers[tab](segs);
}

const SEG_DESC = { waiver:'월요금 면제', half:'반값할인 적용', fixed:'정액할인 적용', sur:'추가요금 포함', normal:'정상가' };

function renderBreakList(segs){
  const wrap = document.getElementById('breakList');
  let html=''; let start=1;
  segs.forEach((s,i)=>{
    const end = start+s.months-1;
    const col = TYPE_COLOR[s.type] || '#2050b5';
    const desc = SEG_DESC[s.type] || '적용가';
    html += '<div class="trow'+(s.type==='waiver'?' waiver':'')+'">';
    html += '<div class="num" style="background:'+col+';">'+(i+1)+'</div>';
    html += '<div class="body"><b>'+start+(s.months>1?'~'+end:'')+'회차 ('+s.months+'개월)</b><div class="sub">'+desc+' · '+fmt(s.fee)+'원/월</div></div>';
    html += '<div class="amt">'+fmt(s.fee)+'원/월<span class="sc">소계 '+fmt(s.fee*s.months)+'원</span></div>';
    html += '</div>';
    start = end+1;
  });
  wrap.innerHTML = html;
}

function openModalForCase(id){
  const segs = activeSegs(casesData[id]);
  setTab(currentTab);
  renderBreakList(segs);
  document.getElementById('modalOverlay').classList.add('show');
}

document.getElementById('feeTrigger').addEventListener('click', ()=>openModalForCase(currentCase));
document.getElementById('modalClose').addEventListener('click', ()=>document.getElementById('modalOverlay').classList.remove('show'));
document.getElementById('modalOverlay').addEventListener('click', (e)=>{ if(e.target.id==='modalOverlay') e.currentTarget.classList.remove('show'); });
document.getElementById('cardSwitch').addEventListener('click', function(){
  cardOn = !cardOn;
  this.classList.toggle('on', cardOn);
  applyCase(currentCase);
});

renderCaseButtons();
applyCase(0);
</script>
